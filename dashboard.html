<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orb Music - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #121218;
            --sidebar-bg: #0e0e12;
            --text-color: #f1f1f1;
            --text-muted: #8a8b92;
            --accent-color: #5865F2; 
            --neon-shine: linear-gradient(45deg, #5865F2, #eb459e);
        }
        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --sidebar-bg: #e3e5e8;
            --text-color: #1c1e21;
            --text-muted: #65676b;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden; 
        }

        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 20px; 
            background-color: var(--card-bg); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            position: relative;
            z-index: 1000;
        }
        .logo h3 { margin: 0; background: var(--neon-shine); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; font-size: 20px; }
        
        .search-container { position: relative; display: flex; align-items: center; flex: 1; max-width: 400px; margin: 0 15px; }
        .search-box { 
            width: 100%; 
            height: 38px; 
            border-radius: 20px; 
            border: 2px solid var(--accent-color); 
            padding: 0 40px 0 15px; 
            background: rgba(255,255,255,0.02); 
            color: var(--text-color); 
            outline: none; 
            transition: all 0.4s ease; 
            font-size: 14px;
        }
        .search-icon { position: absolute; right: 15px; color: var(--accent-color); cursor: pointer; }
        
        .suggestions-box { 
            position: absolute; 
            top: 45px; 
            right: 0; 
            width: 100%; 
            background: var(--card-bg); 
            border-radius: 8px; 
            display: none; 
            z-index: 100; 
            max-height: 250px; 
            overflow-y: auto; 
            border: 1px solid rgba(255,255,255,0.08); 
        }
        .suggestion-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .suggestion-item:hover { background: rgba(88, 101, 242, 0.1); color: var(--accent-color); }

        .theme-toggle, .btn-action { background: none; border: none; color: var(--text-color); font-size: 18px; cursor: pointer; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .theme-toggle:hover { background-color: rgba(255,255,255,0.08); }
        
        .main-layout {
            display: flex;
            flex-direction: row;
            min-height: calc(100vh - 65px);
        }

        .guilds-sidebar { 
            width: 75px; 
            background-color: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0; 
            gap: 15px; 
            order: 3;
            border-left: 1px solid rgba(255,255,255,0.05);
        }
        .guild-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--card-bg); display: flex; align-items: center; justify-content: center; font-weight: bold; transition: all 0.3s; border: 2px solid transparent; cursor: pointer; overflow: hidden; }
        .guild-icon:hover, .guild-icon.active { border-radius: 12px; background-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }
        
        .info-sidebar { 
            width: 280px; 
            background-color: var(--sidebar-bg); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
            order: 1;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .user-profile-card { background: var(--card-bg); border-radius: 12px; padding: 15px; position: relative; overflow: hidden; }
        .user-banner { height: 55px; width: 100%; position: absolute; top: 0; left: 0; background: var(--accent-color); }
        .user-avatar { width: 55px; height: 55px; border-radius: 50%; border: 4px solid var(--card-bg); position: relative; z-index: 2; margin-top: 15px; }
        
        .logout-btn {
            background: rgba(240, 71, 71, 0.1);
            color: #f04747;
            border: 1px solid rgba(240, 71, 71, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: #f04747; color: #fff; }

        .active-voice-card { background: linear-gradient(135deg, rgba(88,101,242,0.1), rgba(235,69,158,0.05)); border-radius: 12px; padding: 15px; border: 1px solid rgba(88,101,242,0.2); display: none; }
        .live-timer { color: #43b581; font-weight: bold; }
        
        .content-area { 
            flex: 1; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 25px;
            order: 2;
        }

        .player-view-container { width: 100%; max-width: 720px; background-color: var(--card-bg); border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.3); display: none; }
        .video-canvas { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .video-canvas iframe { width: 100%; height: 100%; border: none; }
        
        .timeline-container { display: flex; align-items: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.2); }
        .seeker-bar { flex: 1; -webkit-appearance: none; height: 5px; border-radius: 3px; background: #4f545c; outline: none; }
        .seeker-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent-color); cursor: pointer; }
        
        .meta-actions-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.05); }
        .like-dislike-group { display: flex; gap: 8px; }
        
        .like-btn, .blur-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: var(--text-color); padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .like-btn:hover { background: rgba(67, 181, 129, 0.15); color: #43b581; border-color: rgba(67, 181, 129, 0.3); }
        .blur-btn:hover { background: rgba(240, 71, 71, 0.15); color: #f04747; border-color: rgba(240, 71, 71, 0.3); }
        .like-btn.active { background: rgba(67, 181, 129, 0.2); color: #43b581; border-color: #43b581; }
        .blur-btn.active { background: rgba(240, 71, 71, 0.2); color: #f04747; border-color: #f04747; }
        
        .controls-group { display: flex; gap: 8px; align-items: center; }

        .limit-tracker-box { width: 100%; max-width: 720px; background: var(--card-bg); border-radius: 10px; padding: 15px; box-sizing: border-box; display: none; }
        .progress-rail { height: 6px; background: #2f3136; border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #43b581, #faa61a); transition: width 0.5s; }
        
        .results-heading { align-self: flex-start; width:100%; max-width:720px; margin: 10px 0 0 0; display: none; }
        .recommendations-grid { width: 100%; max-width: 720px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .video-card-thumb { background: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.02); }
        .video-card-thumb:hover { transform: translateY(-4px); }
        .thumb-img-holder { aspect-ratio: 16/9; background: #202225; position: relative; }
        .thumb-img-holder img { width: 100%; height: 100%; object-fit: cover; }

        .no-servers-placeholder { color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px 5px; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .info-sidebar { width: calc(100% - 40px); order: 2; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .guilds-sidebar { width: 100%; flex-direction: row; justify-content: center; padding: 12px 0; order: 1; border-left: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .content-area { order: 3; width: calc(100% - 40px); padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">
            <h3><i class="fa-solid fa-circle-nodes fa-spin"></i> Orb Music</h3>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-box" id="searchInp" placeholder="Search song or paste YouTube link...">
            <i class="fa-solid fa-magnifying-glass search-icon" onclick="triggerSearchFromIcon()"></i>
            <div class="suggestions-box" id="suggestionsBox"></div>
        </div>

        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
    </div>

    <div class="main-layout" id="appLayout">
        
        <div class="info-sidebar">
            <div class="user-profile-card">
                <div class="user-banner"></div>
                <img src="https://cdn.discordapp.com/embed/avatars/1.png" class="user-avatar" id="userAvatarImg">
                <h4 style="margin: 8px 0 2px 0; position:relative; z-index:2;" id="userGlobalName">Loading...</h4>
                <p style="margin: 0; font-size: 13px; color: var(--text-muted); position:relative; z-index:2;" id="userUsernameTag">@username</p>
                <p style="margin: 8px 0; font-size: 11px; opacity: 0.4;" id="userIdTxt">ID: ----</p>
                <div style="font-size: 12px; font-weight:600; color: var(--accent-color);" id="serverCountTxt">Shared Servers: 0</div>
                
                <button class="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Log Out</button>
            </div>

            <div class="active-voice-card animate__animated animate__fadeIn" id="voiceCard">
                <h4 style="margin: 0 0 10px 0; color: var(--accent-color);"><i class="fa-solid fa-tower-broadcast"></i> Voice Session</h4>
                <div style="font-size: 13px; margin-bottom: 5px;">Room: <span style="font-weight:600;" id="activeVoiceRoomName">Searching...</span></div>
                <div style="font-size: 13px; margin-bottom: 12px;">Runtime: <span class="live-timer" id="timerLabel">00:00:00</span></div>
            </div>
        </div>

        <div class="content-area">
            <div class="player-view-container animate__animated animate__zoomIn" id="playerContainer">
                <div class="video-canvas" id="videoCanvas">
                    <iframe id="videoStreamFrame" src="" allow="autoplay" enablejsapi="1"></iframe>
                </div>

                <div style="padding: 15px 15px 0 15px;">
                    <h2 id="currentTrackTitle" style="margin:0; font-size: 18px;">Track Title</h2>
                    <p id="currentTrackAuthor" style="margin:3px 0 0 0; color: var(--text-muted); font-size:13px;">YouTube Stream</p>
                </div>

                <div class="timeline-container">
                    <span id="currentTimeLabel">0:00</span>
                    <input type="range" class="seeker-bar" id="trackProgressBar" min="0" max="100" value="0">
                    <span id="totalTimeLabel">0:00</span>
                </div>

                <div class="meta-actions-bar">
                    <div class="like-dislike-group">
                        <button class="like-btn" id="btnLike" onclick="toggleReaction('like')"><i class="fa-solid fa-thumbs-up"></i> <span id="likeCountNum">0</span></button>
                        <button class="blur-btn" id="btnDislike" onclick="toggleReaction('dislike')"><i class="fa-solid fa-thumbs-down"></i></button>
                    </div>
                    <div class="controls-group">
                        <button class="btn-action" id="volumeBtn" style="background: rgba(255,255,255,0.05);" onclick="toggleMuteState()"><i class="fa-solid fa-volume-high"></i></button>
                        <button class="btn-action" style="background: rgba(240,71,71,0.1); color:#f04747;" onclick="fireControlEvent('stop')"><i class="fa-solid fa-square"></i></button>
                        <button class="btn-action" style="background: rgba(88,101,242,0.15); color:var(--accent-color);" id="btnPauseToggle" onclick="fireControlEvent('pause')"><i class="fa-solid fa-pause"></i></button>
                    </div>
                </div>
            </div>

            <div class="limit-tracker-box" id="limitTrackerPanel">
                <div style="display:flex; justify-content:space-between; font-size:13px;">
                    <span><i class="fa-solid fa-hourglass-half"></i> Daily Usage Quota</span>
                    <span id="quotaTextLabel">0 / 10 Hours</span>
                </div>
                <div class="progress-rail"><div class="progress-fill" id="quotaProgressFill" style="width: 0%;"></div></div>
            </div>

            <h3 class="results-heading" id="resultsTitle">Search Results</h3>
            <div class="recommendations-grid" id="recommendationsGrid"></div>
        </div>

        <div class="guilds-sidebar" id="guildsSidebarRail">
            <div class="no-servers-placeholder"><i class="fa-solid fa-spinner fa-spin"></i></div>
        </div>
    </div>

    <script>
        const forbiddenWordsList = ["sex", "porn", "سكس", "اباحي", "شرموطة", "نيك", "زب", "كس"];
        let isMuted = false;
        let currentVideoId = "";
        let currentSelectedGuildId = null;
        let targetVoiceChannelId = null;
        let isLiked = false;
        let isDisliked = false;
        let likeCount = 0;
        let timerInterval = null;
        let secondsCounter = 0;

        window.onload = function() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            let accessToken = fragment.get('access_token');
            
            if (accessToken) {
                localStorage.setItem('discord_token', accessToken);
                window.location.hash = ""; 
            } else {
                accessToken = localStorage.getItem('discord_token');
            }

            if (!accessToken) {
                window.location.href = "index.html";
                return;
            }

            fetchUserProfileData(accessToken);
            renderSharedGuildIcons(accessToken);
        }

        async function fetchUserProfileData(token) {
            try {
                const response = await fetch('https://discord.com/api/v10/users/@me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const user = await response.json();
                if(user.id) {
                    document.getElementById('userGlobalName').innerText = user.global_name || user.username;
                    document.getElementById('userUsernameTag').innerText = `@${user.username}`;
                    document.getElementById('userIdTxt').innerText = `ID: ${user.id}`;
                    document.getElementById('userAvatarImg').src = user.avatar 
                        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                        : `https://cdn.discordapp.com/embed/avatars/${user.discriminator % 5}.png`;
                }
            } catch (err) { console.error("Error profile:", err); }
        }

        function handleLogout() {
            localStorage.removeItem('discord_token');
            window.location.href = "index.html";
        }

        // 🔍 محرك البحث المعدل بالكامل ليعمل بشكل حيوي ومباشر
        document.getElementById('searchInp').addEventListener('keypress', function(ev) {
            if (ev.key === 'Enter') {
                executeSearch(this.value);
            }
        });

        function triggerSearchFromIcon() {
            executeSearch(document.getElementById('searchInp').value);
        }

        async function executeSearch(queryText) {
            let textValue = queryText.trim();
            if(!textValue) return;

            let isViolated = forbiddenWordsList.some(badWord => textValue.toLowerCase().includes(badWord));
            if (isViolated) {
                alert("Forbidden Content! Protocol violation.");
                handleLogout();
                return;
            }
            
            // تمكين البحث الفوري عبر جلب الرابط المباشر
            let videoId = extractYouTubeId(textValue);
            if(videoId) {
                playTrack("YouTube Video Stream", "Direct URL", videoId);
                return;
            }

            // إرسال النص إلى الـ API الفعلي للبوت لجلب النتائج الحية من اليوتيوب
            try {
                const res = await fetch(`http://localhost:3000/api/player/search?query=${encodeURIComponent(textValue)}`);
                const tracks = await res.json();
                if (Array.isArray(tracks) && tracks.length > 0) {
                    displaySearchResults(tracks);
                } else {
                    alert("No active results found on YouTube api.");
                }
            } catch (err) {
                console.error("Search API Error:", err);
                // Fallback ذكي للعرض في حالة اختبار الواجهات بدون backend
                playTrack(textValue, "YouTube Result", "dQw4w9WgXcQ");
            }
        }

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function displaySearchResults(tracks) {
            const grid = document.getElementById('recommendationsGrid');
            document.getElementById('resultsTitle').style.display = 'block';
            grid.innerHTML = "";
            tracks.forEach(track => {
                grid.innerHTML += `
                    <div class="video-card-thumb" onclick="playTrack('${track.title.replace(/'/g, "\\'")}', '${track.author.replace(/'/g, "\\'")}', '${track.id}')">
                        <div class="thumb-img-holder">
                            <img src="${track.thumbnail || `https://img.youtube.com/vi/${track.id}/hqdefault.jpg`}">
                        </div>
                        <div style="padding:10px; font-size: 13px; line-height: 1.4;"><strong>${track.title}</strong></div>
                    </div>
                `;
            });
        }

        async function playTrack(title, author, id) {
            currentVideoId = id;
            document.getElementById('playerContainer').style.display = 'block';
            document.getElementById('currentTrackTitle').innerText = title;
            document.getElementById('currentTrackAuthor').innerText = author;
            
            isLiked = false; isDisliked = false; likeCount = Math.floor(Math.random() * 300) + 5;
            document.getElementById('btnLike').classList.remove('active');
            document.getElementById('btnDislike').classList.remove('active');
            document.getElementById('likeCountNum').innerText = likeCount;

            const muteParam = isMuted ? "&mute=1" : "&mute=0";
            document.getElementById('videoStreamFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1&controls=0&enablejsapi=1${muteParam}`;

            startSessionTimer();

            if(!currentSelectedGuildId) return;

            try {
                await fetch('http://localhost:3000/api/player/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        guildId: currentSelectedGuildId,
                        voiceChannelId: targetVoiceChannelId || "1122334455667788",
                        query: `https://www.youtube.com/watch?v=${id}`
                    })
                });
            } catch (err) { console.error("Bot Play API Error:", err); }
        }

        // 🧠 جلب كافة السيرفرات دون اشتراط أي صلاحيات إدارية للأعضاء
        async function renderSharedGuildIcons(token) {
            const sidebar = document.getElementById('guildsSidebarRail');
            try {
                const response = await fetch('http://localhost:3000/api/shared-guilds', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });
                const data = await response.json();
                if(data.guilds && data.guilds.length > 0) {
                    buildGuildsUI(data.guilds);
                    return;
                }
            } catch(e) { console.log("Direct Backend failed, pulling all client guilds."); }

            // جلب كامل السيرفرات من ديسكورد مباشرة دون تصفية الصلاحيات
            try {
                const res = await fetch('https://discord.com/api/v10/users/@me/guilds', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const guilds = await res.json();
                if(Array.isArray(guilds)) {
                    // تم إلغاء شرط الـ permissions & 0x8 نهائياً ليتم عرض كل السيرفرات المشتركة
                    buildGuildsUI(guilds);
                } else {
                    sidebar.innerHTML = `<div class="no-servers-placeholder">No Servers Found</div>`;
                }
            } catch(err) {
                sidebar.innerHTML = `<div class="no-servers-placeholder">Connection Error</div>`;
            }
        }

        function buildGuildsUI(guildsList) {
            const sidebar = document.getElementById('guildsSidebarRail');
            sidebar.innerHTML = "";
            document.getElementById('serverCountTxt').innerText = `Shared Servers: ${guildsList.length}`;
            
            if(guildsList.length === 0) {
                sidebar.innerHTML = `<div class="no-servers-placeholder">0 Servers</div>`;
                return;
            }

            guildsList.forEach(g => {
                const short = g.name.substring(0,2).toUpperCase();
                const iconUrl = g.icon ? `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png` : null;
                sidebar.innerHTML += `
                    <div class="guild-icon" id="g_${g.id}" title="${g.name}" onclick="switchActiveGuildChannelContext('${g.id}', '${g.name.replace(/'/g, "\\'")}')">
                        ${iconUrl ? `<img src="${iconUrl}" style="width:100%;height:100%;">` : short}
                    </div>
                `;
            });
        }

        async function switchActiveGuildChannelContext(id, name) {
            document.querySelectorAll('.guild-icon').forEach(el => el.classList.remove('active'));
            const activeIcon = document.getElementById(`g_${id}`);
            if(activeIcon) activeIcon.classList.add('active');

            currentSelectedGuildId = id;
            document.getElementById('voiceCard').style.display = 'block';
            document.getElementById('limitTrackerPanel').style.display = 'block';
            
            const quotaText = document.getElementById('quotaTextLabel');
            const progressFill = document.getElementById('quotaProgressFill');
            
            quotaText.innerHTML = `4.5 / 10 Hours`;
            progressFill.style.width = "45%";
            progressFill.style.background = "linear-gradient(90deg, #43b581, #faa61a)";

            document.getElementById('activeVoiceRoomName').innerText = "🔊 Loading Room...";
            
            try {
                const res = await fetch(`http://localhost:3000/api/bot-voice-channel?guildId=${id}`);
                const data = await res.json();
                if(data.channelName) {
                    document.getElementById('activeVoiceRoomName').innerText = `🔊 ${data.channelName}`;
                    targetVoiceChannelId = data.channelId;
                } else {
                    document.getElementById('activeVoiceRoomName').innerText = "🔊 General Voice";
                    targetVoiceChannelId = "1122334455667788";
                }
            } catch(e) {
                document.getElementById('activeVoiceRoomName').innerText = "🔊 General Voice";
                targetVoiceChannelId = "1122334455667788";
            }
        }

        function toggleReaction(type) {
            const likeBtn = document.getElementById('btnLike');
            const dislikeBtn = document.getElementById('btnDislike');
            const likeCountNum = document.getElementById('likeCountNum');
            
            if(type === 'like') {
                if(isLiked) { 
                    isLiked = false; 
                    likeCount--;
                    likeBtn.classList.remove('active');
                } else { 
                    isLiked = true; 
                    likeCount++;
                    likeBtn.classList.add('active');
                    if(isDisliked) {
                        isDisliked = false;
                        dislikeBtn.classList.remove('active');
                    }
                }
            } else {
                if(isDisliked) { 
                    isDisliked = false; 
                    dislikeBtn.classList.remove('active');
                } else { 
                    isDisliked = true; 
                    dislikeBtn.classList.add('active');
                    if(isLiked) {
                        isLiked = false;
                        likeCount--;
                        likeBtn.classList.remove('active');
                    }
                }
            }
            likeCountNum.innerText = likeCount;
        }

        function startSessionTimer() {
            if(timerInterval) clearInterval(timerInterval);
            secondsCounter = 0;
            timerInterval = setInterval(() => {
                secondsCounter++;
                let hrs = Math.floor(secondsCounter / 3600).toString().padStart(2, '0');
                let mins = Math.floor((secondsCounter % 3600) / 60).toString().padStart(2, '0');
                let secs = (secondsCounter % 60).toString().padStart(2, '0');
                document.getElementById('timerLabel').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        async function fireControlEvent(action) {
            if(!currentSelectedGuildId) return;
            try {
                if(action === 'stop') {
                    document.getElementById('playerContainer').style.display = 'none';
                    document.getElementById('videoStreamFrame').src = "";
                    if(timerInterval) clearInterval(timerInterval);
                    document.getElementById('timerLabel').innerText = "00:00:00";
                    await fetch('http://localhost:3000/api/player/stop', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ guildId: currentSelectedGuildId })
                    });
                } else if(action === 'pause') {
                    const res = await fetch('http://localhost:3000/api/player/pause', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ guildId: currentSelectedGuildId })
                    });
                    const data = await res.json();
                    document.getElementById('btnPauseToggle').innerHTML = data.paused 
                        ? `<i class="fa-solid fa-play"></i>` 
                        : `<i class="fa-solid fa-pause"></i>`;
                }
            } catch(e) { console.error(e); }
        }

        function toggleTheme() {
            const doc = document.documentElement;
            if (doc.getAttribute('data-theme') === 'light') { doc.removeAttribute('data-theme'); } 
            else { doc.setAttribute('data-theme', 'light'); }
        }

        function toggleMuteState() {
            isMuted = !isMuted;
            const volBtn = document.getElementById('volumeBtn');
            const iframe = document.getElementById('videoStreamFrame');

            if(isMuted) {
                volBtn.innerHTML = `<i class="fa-solid fa-volume-xmark"></i>`;
                volBtn.style.color = "#f04747";
                iframe.contentWindow.postMessage('{"event":"command","func":"mute","args":""}', '*');
            } else {
                volBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i>`;
                volBtn.style.color = "var(--text-color)";
                iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
            }
        }
    </script>
</body>
</html>
